# Production environment
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Primeiro deploy recomendado:
#   subir com 1 instância web
#   validar saúde, latência, pool do banco e comportamento do nginx
#
# Só depois considerar scaling horizontal:
#   docker-compose -f docker-compose.prod.yml up --scale web=2 -d
#   docker-compose -f docker-compose.prod.yml exec nginx nginx -s reload

services:
  web:
    image: saladetriagem:latest
    command: gunicorn --config gunicorn.conf.py wsgi:app
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
    volumes:
      - uploads:/var/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker:
    image: saladetriagem:latest
    command: celery -A app.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4}
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
    depends_on:
      - redis

  beat:
    image: saladetriagem:latest
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-triagem_db}
      POSTGRES_USER: ${POSTGRES_USER:-triagem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-triagem}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-defaultpassword}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli --no-auth-warning ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  uploads: