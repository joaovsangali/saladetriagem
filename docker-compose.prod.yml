version: "3.9"

# Production environment — ready for 100+ concurrent users
# Usage: ./scripts/deploy.sh

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro  # mount TLS certs here
    depends_on:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build: .
    command: gunicorn --config gunicorn.conf.py wsgi:app
    expose:
      - "8000"
    env_file: .env
    environment:
      - FLASK_ENV=production
      - STORAGE_BACKEND=s3
    volumes:
      - uploads:/var/app/uploads  # fallback only, S3 is primary
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - FLASK_ENV=production
    volumes:
      - uploads:/var/app/uploads
    depends_on:
      - web
      - redis
      - db
    restart: unless-stopped

  beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - FLASK_ENV=production
    volumes:
      - ./celerybeat-schedule:/app/celerybeat-schedule  # persistent schedule
    depends_on:
      - redis
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local