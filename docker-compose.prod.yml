version: "3.9"

# Production environment
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# To run multiple web workers (horizontal scaling):
#   docker-compose -f docker-compose.prod.yml up --scale web=3 -d
#   docker-compose -f docker-compose.prod.yml exec nginx nginx -s reload
#
# After scaling, reload nginx so it picks up the new container IPs.

services:
  web:
    image: saladetriagem:latest
    command: gunicorn --config gunicorn.conf.py wsgi:app
    restart: unless-stopped
    # Port 8000 is intentionally NOT published to the host.
    # All external traffic goes through nginx (ports 80/443).
    env_file: .env
    environment:
      - FLASK_ENV=production
    volumes:
      - uploads:/var/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # deploy.replicas is used by Docker Swarm (docker stack deploy).
    # For plain docker-compose, use --scale web=N instead.
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker:
    image: saladetriagem:latest
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
    depends_on:
      - redis

  beat:
    image: saladetriagem:latest
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-triagem_db}
      POSTGRES_USER: ${POSTGRES_USER:-triagem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-triagem}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Shared uploads volume — only needed when STORAGE_BACKEND=local.
      # Safe to keep even when using S3 (nginx won't serve files directly).
      - uploads:/var/app/uploads:ro
    depends_on:
      - web

volumes:
  pgdata:
  redisdata:
  uploads:
