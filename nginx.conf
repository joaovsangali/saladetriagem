# nginx.conf — Sala de Triagem load balancer / reverse proxy
#
# Mount this file into the nginx container:
#   volumes:
#     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
#
# Scaling web workers:
#   docker-compose -f docker-compose.prod.yml up --scale web=3 -d
#   docker-compose -f docker-compose.prod.yml exec nginx nginx -s reload
#
# The "web" upstream name is resolved by Docker's embedded DNS (127.0.0.11).
# Reload nginx after scaling so it picks up new container IPs.

upstream web_backend {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;

    # Must be >= Flask MAX_CONTENT_LENGTH (default 12 MB) to allow uploads.
    client_max_body_size 15m;

    # Pass real client IP to the application.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Healthcheck — fast path used by Docker and load balancers.
    location /health {
        proxy_pass http://web_backend;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass http://web_backend;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Disable request buffering so that large file uploads are streamed
        # directly to Gunicorn instead of being held in nginx memory.
        proxy_request_buffering off;

        # Keep connections alive to backends.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------
    # HTTPS — uncomment and adapt once you have a TLS certificate.
    # -----------------------------------------------------------------
    # listen 443 ssl http2;
    # server_name YOURDOMAIN.example.com;
    #
    # ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    #
    # # Redirect HTTP → HTTPS (add a second server block for port 80):
    # # server {
    # #     listen 80;
    # #     server_name YOURDOMAIN.example.com;
    # #     return 301 https://$host$request_uri;
    # # }
}
