<!-- partials/modal.html — Reusable modal partial -->
<!-- Usage: {% include 'partials/modal.html' %} -->
<!-- Trigger with: data-bs-toggle="modal" data-bs-target="#genericModal" -->
<!-- Customize id, title and body via JS or set variables before including -->

<div class="modal fade" id="genericModal" tabindex="-1" aria-labelledby="genericModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="genericModalLabel">Informação</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body" id="genericModalBody">
        <!-- Content injected via JS or server-side -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
